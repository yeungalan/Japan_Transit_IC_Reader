
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/4.2.4/tocas.min.css" integrity="sha512-Azbpzww2iwgZnmRJqLrQVZktLB5Vk8wnmQjk1G0rm15HnD4Arovfnmb52Yqx2von3BY3eKB+oogNo6qV1RFfHA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/4.2.4/tocas.min.js" integrity="sha512-M7tPiRrT1T65NiwmF9q+hSAUNW4CPmCy12MRbpJjIX31kR6xL0xlt4fkkIafhwK6d+LoS7RjLUkZ2sPdlpratQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;1000&display=swap" rel="stylesheet" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="./js/csv.min.js"></script>
		<script src="./js/process.js"></script>
		<script type="module" src="./js/nfcread.js"></script>
		<title>SFCard Viewer Web版</title>
    </head>
    <body>
        <!-- 頂部列 -->
        <div class="ts-content is-tertiary is-fitted">
            <div class="ts-container">
                <div class="ts-tab">
                    <a href="#!" class="is-active item">ICカード利用履歴</a>
					<a href="#!" id="reload" class="item">ICカードを読み込む</a>
                </div>
            </div>
        </div>
        <!-- / 頂部列 -->

        <div class="ts-divider"></div>

        <!-- 矚目看板 -->
        <div class="ts-content is-tertiary is-vertically-padded">
            <div class="ts-container u-vertically-spaced-large">
                <div id="finalBalance" class="ts-header is-massive">¥-</div>
                <div class="ts-text is-secondary">残額</div>
            </div>
        </div>
        <!-- / 矚目看板 -->

        <div class="ts-divider"></div>

        <!-- 定期票セクション -->
        <div id="teikiSection" class="ts-container u-vertically-padded-big" style="display:none">
            <div class="ts-header is-large" style="margin-bottom:0.5em">定期票</div>
            <div id="teikiList"></div>
        </div>
        <div id="teikiNone" class="ts-container u-vertically-padded-big" style="display:none">
            <span class="ts-badge is-secondary">定期票なし</span>
        </div>
        <!-- / 定期票セクション -->

        <div class="ts-divider"></div>
        <div class="ts-container u-vertically-padded-big">

			<table class="ts-table is-striped is-relaxed is-basic u-top-spaced-small">
                <thead>
                    <tr>
                        <th>利用年月日</th>
                        <th>入場駅 / 事業者</th>
                        <th>出場駅 / 降車場所</th>
                        <th>利用額</th>
                        <th>残額</th>
						<th>メモ</th>
                    </tr>
                </thead>
                <tbody id="table">
                </tbody>
            </table>
			<div id="loader" class="ts-loading is-centered is-notched is-large"></div>
        </div>
    </body>

	<script>
		const module = {};

	</script>
	<script type="module">
		import {initNFC, readCard, readCommuterPass} from "./js/nfcRead.js";
		module.initNFC = initNFC;
		module.readCard = readCard;
		module.readCommuterPass = readCommuterPass;
	</script>

	
	<script>
		document.getElementById("reload").addEventListener("click", readNewCard);

		// Only load the station CSV on page load.
		// NFC init is deferred to the first button click so the USB
		// permission dialog is triggered by a real user gesture.
		window.addEventListener('load', function () {
			init();
		});


		async function readNewCard() {
			// Reset UI
			$("#table").html("");
			$("#loader").attr("style", "");
			$("#table").attr("style", "display:none");
			$("#finalBalance").text("¥-");
			$("#teikiSection").hide();
			$("#teikiNone").hide();
			$("#teikiList").html("");

			// initNFC() must run inside a user-gesture handler so the browser
			// allows the WebUSB device-selection dialog.
			var ok = await module.initNFC();
			if (!ok) {
				$("#loader").attr("style", "display:none");
				$("#finalBalance").text("接続エラー");
				return;
			}

			// Read transaction history (service 0x090F, blocks 0x00-0x13)
			for(var i = 0x00; i < 0x14; i++) {
				const result = await module.readCard(i);
				insertTable(inputResult(result));
			}

			calculateBalance();
			$("#table").attr("style", "");
			$("#loader").attr("style", "display:none");

			// Read commuter pass data (service 0x108F, up to 3 slots)
			await readAndShowTeiki();
		}

		async function readAndShowTeiki() {
			var foundAny = false;

			for (var slot = 0x00; slot < 0x03; slot++) {
				var raw = await module.readCommuterPass(slot);
				if (!raw) continue;

				var pass = parseCommuterPass(raw);
				if (!pass) continue;

				foundAny = true;
				insertTeiki(pass, slot);
			}

			if (foundAny) {
				$("#teikiSection").show();
			} else {
				$("#teikiNone").show();
			}
		}

		function insertTeiki(pass, slot) {
			var fromName = pass["from"]
				? pass["from"][0] + " " + pass["from"][2]
				: "（不明 " + pass["fromRaw"] + "）";
			var toName = pass["to"]
				? pass["to"][0] + " " + pass["to"][2]
				: "（不明 " + pass["toRaw"] + "）";

			var startStr = pass["startDate"][0] + "/" + pass["startDate"][1] + "/" + pass["startDate"][2];
			var endStr   = pass["endDate"][0]   + "/" + pass["endDate"][1]   + "/" + pass["endDate"][2];

			// Check validity relative to today
			var today = new Date();
			var endDate = new Date(pass["endDate"][0], parseInt(pass["endDate"][1]) - 1, parseInt(pass["endDate"][2]));
			var isValid = endDate >= today;
			var validBadge = isValid
				? '<span class="ts-badge is-positive" style="margin-left:0.5em">有効</span>'
				: '<span class="ts-badge is-negative" style="margin-left:0.5em">期限切れ</span>';

			var html =
				'<div class="ts-box" style="margin-bottom:0.8em;padding:0.8em 1em">' +
					'<div style="display:flex;align-items:center;gap:0.5em;margin-bottom:0.4em">' +
						'<span class="ts-badge is-primary">' + pass["typeName"] + '</span>' +
						validBadge +
					'</div>' +
					'<div class="ts-text is-large" style="font-weight:700;margin:0.3em 0">' +
						fromName + ' <span style="color:#888">→</span> ' + toName +
					'</div>' +
					'<div class="ts-text is-secondary">' +
						'有効期間：' + startStr + ' 〜 ' + endStr +
					'</div>' +
				'</div>';

			$("#teikiList").append(html);
		}


		async function insertTable(information) {
			console.log(information);
			if(information["sequence"] == 0 && information["console"] == "???" && information["process"] == "???") {
				return;
			}
			var newRow = '<tr>' +
                    '<td>' + information["date"][0] + "/" + information["date"][1] + "/" + information["date"][2] + '</td>' +
                    '<td>' + handleUndefinedInput(information["enter"])[0] + " " + handleUndefinedInput(information["enter"])[2] + '</td>' +
                    '<td>' + handleUndefinedInput(information["enter"])[0] + " " + handleUndefinedInput(information["leave"])[2] + '</td>' +
                    '<td id="amount">' + "¥----" + '</td>' +
                    '<td id="balance">' + "¥" + information["balance"] + '</td>' +
                    '<td>' + information["process"] + '</td>' +
                    '</tr>';

            // Append the new row to the table's tbody
            $("#table").append(newRow);
		}
		function handleUndefinedInput(input) {
			if (typeof input === 'undefined') {
				return ['','',''];
			} else {
				return input;
			}
		}

		function calculateBalance() {
			var firstCol = $("#table > tr").first();
			var col = $("#table > tr");
			var prev = null;
			var first = true;
			col.each(function() {
				if(first) {
					prev = $(this);
					first = false;
				}else{
					var currBalance = $(this).children("#balance").text().replace("¥", "");
					var prevBalance = $(prev).children("#balance").text().replace("¥", "");
					console.log(currBalance + "-" + prevBalance);
					var diff = parseInt(currBalance) - parseInt(prevBalance);
					if(diff < 0) {
						diff *= -1;
						$(prev).children("#amount").text("+¥" + diff);
					}else{
						$(prev).children("#amount").text("¥" + diff);
					}

					prev = $(this);
				}
			});
			$("#finalBalance").text(firstCol.children("#balance").text());
		}

	</script>
</html>
